<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导航管理</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>导航管理</h1>
      <p>在这里新增、分组和清理你的常用网站。</p>
    </header>

    <section class="panel-grid">
      <section class="panel">
        <div class="list-head">
          <h2>添加网址</h2>
          <a class="ghost-btn link-btn" href="index.html">返回导航页</a>
        </div>
        <form id="siteForm" class="site-form">
          <label>
            网站名称
            <input id="nameInput" name="name" type="text" placeholder="例如：GitHub" required>
          </label>
          <label>
            网站地址
            <input id="urlInput" name="url" type="url" placeholder="例如：https://github.com" required>
          </label>
          <label>
            分组
            <select id="categoryInput" name="category"></select>
          </label>
          <button type="submit">添加到导航</button>
        </form>
        <p id="message" class="message" aria-live="polite"></p>
        <hr class="divider">
        <h2>分组管理</h2>
        <form id="groupForm" class="group-form">
          <input id="groupInput" name="group" type="text" placeholder="新分组名称，例如：工作">
          <button type="submit">新增分组</button>
        </form>
        <div id="groupList" class="group-manage-list"></div>
      </section>

      <section class="panel">
        <div class="list-head">
          <h2>网站管理</h2>
          <button id="clearBtn" class="ghost-btn" type="button">恢复默认</button>
        </div>
        <p style="margin: 0 0 12px; font-size: 12px; color: var(--muted);">💡 拖拽网站卡片可调整顺序</p>
        <div id="siteList" class="group-list"></div>
      </section>
    </section>
  </main>

  <div id="editModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal></div>
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
      <h2 id="editModalTitle">编辑网站</h2>
      <form id="editForm" class="site-form">
        <label>
          网站名称
          <input id="editNameInput" name="editName" type="text" required>
        </label>
        <label>
          网站地址
          <input id="editUrlInput" name="editUrl" type="url" required>
        </label>
        <label>
          分组
          <select id="editCategoryInput" name="editCategory"></select>
        </label>
        <div class="modal-actions">
          <button id="cancelEditBtn" class="ghost-btn" type="button">取消</button>
          <button type="submit">保存修改</button>
        </div>
      </form>
    </section>
  </div>

  <script src="sites-data.js"></script>
  <script src="manage.js"></script>
</body>
</html>
